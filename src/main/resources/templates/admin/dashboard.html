<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Dashboard | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>

<!-- Admin Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark lncp-navbar">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">
            <i class="bi bi-speedometer2 me-2"></i>LNCP Admin
        </a>
        <div class="d-flex gap-2">
            <a href="/admin/menu" class="btn btn-outline-light btn-sm"><i class="bi bi-list-ul me-1"></i>Menu</a>
            <a href="/" class="btn btn-outline-light btn-sm" target="_blank"><i class="bi bi-shop me-1"></i>View Shop</a>
            <form method="post" action="/admin/logout" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-outline-warning btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container-fluid py-4 px-4">
    <!-- Stats Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-white bg-primary">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="bi bi-bag-fill fs-1 opacity-75"></i>
                    <div><div class="small">Total Orders</div><div class="fs-3 fw-bold" th:text="${totalOrders}">0</div></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-white bg-warning">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="bi bi-clock-fill fs-1 opacity-75"></i>
                    <div><div class="small text-dark">Pending</div><div class="fs-3 fw-bold text-dark" th:text="${pendingOrders}">0</div></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-white bg-success">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="bi bi-check-circle-fill fs-1 opacity-75"></i>
                    <div><div class="small">Delivered</div><div class="fs-3 fw-bold" th:text="${totalOrders - pendingOrders}">0</div></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-white bg-danger">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="bi bi-fire fs-1 opacity-75"></i>
                    <div><div class="small">Live System</div><div class="fs-5 fw-bold">ACTIVE ✓</div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Flash -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search & Orders -->
    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center bg-white">
            <h5 class="mb-0 fw-bold"><i class="bi bi-list-ol me-2"></i>Orders</h5>
            <form method="get" action="/admin/dashboard" class="d-flex gap-2">
                <input type="text" name="search" class="form-control form-control-sm" placeholder="Search Order ID..."
                       th:value="${search}" style="width:200px"/>
                <button class="btn btn-sm btn-danger"><i class="bi bi-search"></i></button>
                <a href="/admin/dashboard" class="btn btn-sm btn-outline-secondary" th:if="${search}">Clear</a>
            </form>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Mobile</th>
                            <th>Items</th>
                            <th class="text-end">Total</th>
                            <th class="text-center">Status</th>
                            <th>Time</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td class="fw-bold" th:text="${order.orderId}">LNCP-1001</td>
                            <td th:text="${order.customerName != null ? order.customerName : '—'}">Name</td>
                            <td th:text="${order.mobileNumber != null ? order.mobileNumber : '—'}">Mobile</td>
                            <td th:text="${#lists.size(order.orderItems)}">0</td>
                            <td class="text-end fw-bold">₹<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}">0</span></td>
                            <td class="text-center">
                                <span th:class="'badge ' + ${order.status.badgeClass}" th:text="${order.status}">STATUS</span>
                            </td>
                            <td class="small text-muted" th:text="${#temporals.format(order.createdAt, 'dd MMM HH:mm')}">Time</td>
                            <td class="text-center">
                                <a th:href="'/admin/orders/' + ${order.orderId}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="8" class="text-center text-muted py-4">No orders found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>setTimeout(() => location.reload(), 30000);</script>
</body>
</html>
