<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin Login | LNCP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4 col-sm-8">
            <div class="text-center mb-4">
                <div class="display-4 mb-2">🍛</div>
                <h4 class="fw-bold">Laxmi Narayana Curry Point</h4>
                <p class="text-muted">Admin Portal</p>
            </div>

            <div class="card shadow">
                <div class="card-header lncp-navbar text-white text-center py-3">
                    <h5 class="mb-0"><i class="bi bi-shield-lock me-2"></i>Admin Login</h5>
                </div>
                <div class="card-body p-4">
                    <div th:if="${param.error}" class="alert alert-danger py-2">
                        <i class="bi bi-exclamation-circle me-2"></i>Invalid username or password
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info py-2">
                        <i class="bi bi-check-circle me-2"></i>Logged out successfully
                    </div>

                    <form method="post" action="/admin/login">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" name="username" class="form-control" placeholder="admin" required autofocus/>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login
                        </button>
                    </form>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="/" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Menu</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
