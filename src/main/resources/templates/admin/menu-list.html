<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Menu Management | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-dark lncp-navbar">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/admin/dashboard"><i class="bi bi-speedometer2 me-2"></i>LNCP Admin</a>
        <div class="d-flex gap-2">
            <a href="/admin/dashboard" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Dashboard</a>
            <form method="post" action="/admin/logout" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-outline-warning btn-sm"><i class="bi bi-box-arrow-right"></i></button>
            </form>
        </div>
    </div>
</nav>

<div class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0"><i class="bi bi-list-ul me-2"></i>Menu Management</h4>
        <a href="/admin/menu/new" class="btn btn-danger"><i class="bi bi-plus-circle me-2"></i>Add Item</a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th class="text-end">Price</th>
                        <th class="text-center">Available</th>
                        <th class="text-center">Special</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td>
                            <div class="fw-semibold" th:text="${item.name}">Item</div>
                            <div class="text-muted small" th:text="${item.description}">Desc</div>
                        </td>
                        <td><span class="badge bg-secondary" th:text="${item.getCategoryDisplayName()}">Cat</span></td>
                        <td class="text-end fw-bold">₹<span th:text="${#numbers.formatDecimal(item.price, 1, 'COMMA', 2, 'POINT')}">0</span></td>
                        <td class="text-center">
                            <form method="post" th:action="'/admin/menu/' + ${item.id} + '/toggle-availability'" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm" th:classappend="${item.available} ? 'btn-success' : 'btn-outline-secondary'">
                                    <i th:class="${item.available} ? 'bi bi-toggle-on' : 'bi bi-toggle-off'"></i>
                                </button>
                            </form>
                        </td>
                        <td class="text-center">
                            <form method="post" th:action="'/admin/menu/' + ${item.id} + '/toggle-special'" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm" th:classappend="${item.todaySpecial} ? 'btn-warning' : 'btn-outline-secondary'">
                                    <i class="bi bi-star-fill" th:if="${item.todaySpecial}"></i>
                                    <i class="bi bi-star" th:unless="${item.todaySpecial}"></i>
                                </button>
                            </form>
                        </td>
                        <td class="text-center">
                            <a th:href="'/admin/menu/' + ${item.id} + '/edit'" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form method="post" th:action="'/admin/menu/' + ${item.id} + '/delete'" class="d-inline"
                                  onsubmit="return confirm('Delete this item?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
