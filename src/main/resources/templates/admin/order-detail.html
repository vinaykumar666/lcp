<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Order Detail | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-dark lncp-navbar">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/admin/dashboard"><i class="bi bi-speedometer2 me-2"></i>LNCP Admin</a>
        <a href="/admin/dashboard" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div th:if="${success}" class="alert alert-success"><i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span></div>

            <div class="card shadow">
                <div class="card-header lncp-navbar text-white d-flex justify-content-between align-items-center py-3">
                    <div>
                        <h5 class="mb-0 fw-bold" th:text="${order.orderId}">LNCP-1001</h5>
                        <small th:text="'Placed: ' + ${#temporals.format(order.createdAt, 'dd MMM yyyy hh:mm a')}"></small>
                    </div>
                    <span th:class="'badge fs-5 ' + ${order.statusBadgeClass}" th:text="${order.status}">STATUS</span>
                </div>
                <div class="card-body">
                    <!-- Customer Info -->
                    <div class="row mb-3 g-2">
                        <div class="col-md-6">
                            <div class="p-3 bg-light rounded">
                                <div class="small text-muted">Customer</div>
                                <div class="fw-semibold" th:text="${order.customerName != null ? order.customerName : 'Not provided'}">Name</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="p-3 bg-light rounded">
                                <div class="small text-muted">Mobile</div>
                                <div class="fw-semibold" th:text="${order.mobileNumber != null ? order.mobileNumber : 'Not provided'}">Mobile</div>
                            </div>
                        </div>
                    </div>

                    <!-- Order Items -->
                    <h6 class="fw-bold mb-2"><i class="bi bi-list-check me-2"></i>Order Items</h6>
                    <table class="table table-bordered mb-3">
                        <thead class="table-light">
                            <tr><th>Item</th><th class="text-center">Qty</th><th class="text-end">Unit Price</th><th class="text-end">Subtotal</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.orderItems}">
                                <td th:text="${item.itemName}">Item</td>
                                <td class="text-center" th:text="${item.quantity}">1</td>
                                <td class="text-end">₹<span th:text="${#numbers.formatDecimal(item.unitPrice, 1, 'COMMA', 2, 'POINT')}">0</span></td>
                                <td class="text-end fw-bold">₹<span th:text="${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}">0</span></td>
                            </tr>
                        </tbody>
                        <tfoot class="table-light">
                            <tr><td colspan="3" class="fw-bold text-end">Total</td>
                                <td class="text-end fw-bold text-danger fs-5">₹<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}">0</span></td></tr>
                        </tfoot>
                    </table>

                    <!-- Update Status -->
                    <div class="card border-warning">
                        <div class="card-header bg-warning fw-bold"><i class="bi bi-pencil me-2"></i>Update Status</div>
                        <div class="card-body">
                            <form method="post" th:action="'/admin/orders/' + ${order.orderId} + '/status'" class="d-flex gap-2 align-items-center">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <select name="status" class="form-select">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                            th:selected="${s == order.status}">STATUS</option>
                                </select>
                                <button type="submit" class="btn btn-danger px-4 fw-bold">Update</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
