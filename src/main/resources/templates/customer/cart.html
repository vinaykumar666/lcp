<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Cart | Laxmi Narayana Curry Point</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark lncp-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shop me-2"></i>Laxmi Narayana Curry Point</a>
        <a href="/menu" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Back to Menu</a>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <h3 class="fw-bold mb-3"><i class="bi bi-cart3 me-2 text-danger"></i>Your Cart</h3>

    <!-- Empty cart -->
    <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5">
        <div class="display-1">🛒</div>
        <h4 class="text-muted mt-3">Your cart is empty</h4>
        <a href="/menu" class="btn btn-danger mt-3">Browse Menu</a>
    </div>

    <!-- Cart items -->
    <div th:if="${!#lists.isEmpty(cartItems)}">
        <div class="card shadow-sm mb-3">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Item</th>
                            <th class="text-center">Price</th>
                            <th class="text-center">Qty</th>
                            <th class="text-center">Subtotal</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td class="fw-semibold" th:text="${item.name()}">Item</td>
                            <td class="text-center">₹<span th:text="${#numbers.formatDecimal(item.price(), 1, 'COMMA', 2, 'POINT')}">0</span></td>
                            <td class="text-center">
                                <form method="post" action="/cart/update" class="d-inline">
                                    <input type="hidden" name="itemId" th:value="${item.itemId()}"/>
                                    <div class="input-group input-group-sm" style="width:100px;margin:auto">
                                        <input type="number" name="quantity" class="form-control text-center"
                                               th:value="${item.quantity()}" min="0" max="10"/>
                                        <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-check"></i></button>
                                    </div>
                                </form>
                            </td>
                            <td class="text-center fw-bold text-danger">₹<span th:text="${#numbers.formatDecimal(item.subtotal(), 1, 'COMMA', 2, 'POINT')}">0</span></td>
                            <td class="text-center">
                                <form method="post" action="/cart/remove">
                                    <input type="hidden" name="itemId" th:value="${item.itemId()}"/>
                                    <button class="btn btn-sm btn-outline-danger" type="submit"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot class="table-light">
                        <tr>
                            <td colspan="3" class="fw-bold text-end">Total:</td>
                            <td class="text-center fw-bold fs-5 text-danger">₹<span th:text="${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">0</span></td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- Order Form -->
        <div class="card shadow-sm">
            <div class="card-header bg-danger text-white fw-bold">
                <i class="bi bi-person-check me-2"></i>Your Details (Optional)
            </div>
            <div class="card-body">
                <form method="post" action="/order/place">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Your Name <small class="text-muted">(Optional)</small></label>
                            <input type="text" name="customerName" class="form-control" placeholder="Enter your name"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Mobile Number <small class="text-muted">(Optional)</small></label>
                            <input type="tel" name="mobileNumber" class="form-control" placeholder="Enter mobile number"/>
                        </div>
                    </div>
                    <div class="mt-3 d-flex gap-2">
                        <a href="/menu" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Add More</a>
                        <button type="submit" class="btn btn-danger flex-grow-1 fw-bold">
                            <i class="bi bi-bag-check me-2"></i>Place Order — ₹<span th:text="${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">0</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
