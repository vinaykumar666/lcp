<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Track Order | Laxmi Narayana Curry Point</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark lncp-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shop me-2"></i>Laxmi Narayana Curry Point</a>
        <a href="/menu" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Menu</a>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <h3 class="fw-bold mb-3"><i class="bi bi-search me-2 text-danger"></i>Track Your Order</h3>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form method="post" action="/track" class="d-flex gap-2">
                        <input type="text" name="orderId" class="form-control form-control-lg"
                               placeholder="Enter Order ID (e.g. LNCP-1001)"
                               th:value="${orderId}" style="text-transform:uppercase"/>
                        <button type="submit" class="btn btn-danger btn-lg px-4">
                            <i class="bi bi-search"></i>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Error -->
            <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span></div>

            <!-- Order Details -->
            <div th:if="${order}" id="orderStatus">
                <div class="card shadow">
                    <div class="card-header lncp-navbar text-white d-flex justify-content-between align-items-center">
                        <span class="fw-bold" th:text="${order.orderId}">LNCP-1001</span>
                        <span th:class="'badge fs-6 ' + ${order.statusBadgeClass}" th:text="${order.status}">ACCEPTED</span>
                    </div>
                    <div class="card-body">
                        <!-- Progress Tracker -->
                        <div class="order-progress mb-4">
                            <div class="row text-center g-0">
                                <div th:each="step, stat : ${ {'ACCEPTED','PREPARING','READY','DELIVERED'} }"
                                     class="col">
                                    <div th:class="'progress-step ' + (${order.status.name() == step || (order.status.name() == 'PREPARING' && stat.index <= 1) || (order.status.name() == 'READY' && stat.index <= 2) || (order.status.name() == 'DELIVERED')} ? 'active' : '')">
                                        <div class="step-icon">
                                            <span th:switch="${step}">
                                                <span th:case="'ACCEPTED'">✅</span>
                                                <span th:case="'PREPARING'">👨‍🍳</span>
                                                <span th:case="'READY'">🔔</span>
                                                <span th:case="'DELIVERED'">🎉</span>
                                            </span>
                                        </div>
                                        <div class="step-label small" th:text="${step}">Step</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div th:if="${order.customerName}" class="mb-2">
                            <strong>Customer:</strong> <span th:text="${order.customerName}"></span>
                        </div>
                        <div th:if="${order.mobileNumber}" class="mb-2">
                            <strong>Mobile:</strong> <span th:text="${order.mobileNumber}"></span>
                        </div>
                        <div class="mb-2">
                            <strong>Placed at:</strong>
                            <span th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy hh:mm a')}"></span>
                        </div>

                        <hr/>
                        <h6 class="fw-bold">Order Items</h6>
                        <table class="table table-sm">
                            <tbody>
                                <tr th:each="item : ${order.orderItems}">
                                    <td th:text="${item.itemName}">Item</td>
                                    <td class="text-center">x<span th:text="${item.quantity}">1</span></td>
                                    <td class="text-end">₹<span th:text="${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}">0</span></td>
                                </tr>
                            </tbody>
                            <tfoot class="table-light">
                                <tr>
                                    <td colspan="2" class="fw-bold">Total</td>
                                    <td class="fw-bold text-danger text-end">₹<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}">0</span></td>
                                </tr>
                            </tfoot>
                        </table>

                        <p class="text-muted small mb-0 text-center">
                            <i class="bi bi-arrow-repeat me-1"></i>Auto-refreshing every 10 seconds...
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Auto-refresh every 10 seconds if tracking an order
    const orderId = /*[[${orderId}]]*/ null;
    if (orderId) {
        setTimeout(() => location.reload(), 10000);
    }
</script>
</body>
</html>
