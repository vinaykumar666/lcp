<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Error | LNCP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
<div class="container text-center py-5">
    <div class="display-1 mb-3">😕</div>
    <h1 class="display-4 fw-bold text-danger" th:text="${errorCode ?: '500'}">500</h1>
    <p class="lead text-muted" th:text="${errorMessage ?: 'Something went wrong'}">Error</p>
    <div class="d-flex gap-2 justify-content-center mt-4">
        <a href="/" class="btn btn-danger">Back to Menu</a>
        <a href="/admin/dashboard" class="btn btn-outline-secondary">Admin</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
